<style>
  .texto-version {
    font-size: 20px;
    font-family: "Poppins", sans-serif;
    margin-left: 25px;
  }

  .search-box {
    max-width: 600px;
    margin: auto;
  }

  .categoria {
    cursor: pointer;
    transition: 0.3s;
    min-width: 100px;
    text-align: center;
  }

  .categoria i {
    display: block;
    font-size: 40px;
  }

  .categoria p {
    margin-top: 8px;
    font-size: 14px;
    white-space: nowrap; /* 👈 evita que se parta mal */
    overflow: hidden;
    text-overflow: ellipsis; /* 👈 agrega ... si no cabe */
  }

  .categoria:hover {
    transform: scale(1.1);
  }

  .card-servicio {
    border-radius: 15px;
    transition: 0.3s;
  }

  .card-servicio:hover {
    transform: translateY(-5px);
  }
</style>

<div class="container-fluid text-center mt-5 px-3">
  <!-- LOGO -->
  <div class="mb-4">
    <img
      id="imgBienvenida"
      src="/mse/assets/bienvenida.png"
      style="max-width: 180px"
    />
    <p class="mt-2">¡Aquí estamos para ayudarte!</p>
  </div>

  <!-- BUSCADOR -->
  <div class="input-group shadow search-box">
    <span class="input-group-text bg-white">
      <i class="bi bi-search"></i>
    </span>
    <input
      type="text"
      id="buscador"
      class="form-control"
      placeholder="Buscar servicio... (ej: manicure, instalar Office, electricidad)"
    />
    <button
      class="btn btn-primary"
      onclick="nsConsultarServicios.buscarServicio()"
    >
      Buscar
    </button>
  </div>

  <!-- CATEGORÍAS -->
  <div class="d-flex justify-content-center gap-4 mt-4 flex-wrap">
    <div class="categoria" onclick="filtrar('tecnologia')">
      <i class="bi bi-pc-display fs-1 text-primary"></i>
      <p>Tecnología</p>
    </div>

    <div class="categoria" onclick="filtrar('belleza')">
      <i class="bi bi-brush fs-1 text-danger"></i>
      <p>Belleza</p>
    </div>

    <div class="categoria" onclick="filtrar('electricidad')">
      <i class="bi bi-lightning fs-1 text-warning"></i>
      <p>Electricidad</p>
    </div>

    <div class="categoria" onclick="filtrar('hogar')">
      <i class="bi bi-tools fs-1 text-secondary"></i>
      <p>Hogar</p>
    </div>

    <div class="categoria" onclick="filtrar('otros')">
      <i class="bi bi-box fs-1 text-success"></i>
      <p>Otros</p>
    </div>
  </div>
</div>

<!-- RESULTADOS -->
<div class="container-fluid mt-4">
  <div class="row g-4" id="resultados"></div>
</div>

<script>
  // 🚫 INICIAR VACÍO (sin resultados)
  document.getElementById("resultados").innerHTML = "";

  // 🔎 BUSCAR AL ESCRIBIR
  document.getElementById("buscador").addEventListener("keyup", () => {
    nsConsultarServicios.buscarServicio();
  });

  var nsConsultarServicios = (function () {
    // 🔍 BUSCAR SERVICIOS
    async function buscarServicio() {
      const texto = document.getElementById("buscador").value.trim();

      // 👉 SI ESTÁ VACÍO → NO MOSTRAR NADA
      if (!texto) {
        document.getElementById("resultados").innerHTML = "";
        return;
      }

      try {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session) {
          alert("Debes iniciar sesión");
          return;
        }

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/mse_consultar_servicios`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ search: texto }),
          },
        );

        const result = await response.json();

        if (result.status === "success") {
          pintarServicios(result.servicios);
        } else {
          console.error(result.message);
        }
      } catch (err) {
        console.error("Error:", err);
      }
    }

    // 🎨 PINTAR SERVICIOS (ESTILO COMO TU IMAGEN)
    function pintarServicios(servicios) {
      const contenedor = document.getElementById("resultados");

      if (!servicios || servicios.length === 0) {
        contenedor.innerHTML =
          '<p class="text-center py-5 text-muted">No se encontraron servicios</p>';
        return;
      }

      contenedor.innerHTML = servicios
        .map(
          (s) => `
    <div class="col-6 col-md-3 col-lg-2">
      <div class="card card-servicio shadow-sm p-2 text-center h-100">

        <!-- ICONO -->
        <div class="mb-2">
          <img src="${s.logo || "/mse/assets/logo1.png"}"
               style="height:40px; object-fit:contain;">
        </div>

        <!-- NOMBRE -->
        <h6 class="fw-bold mb-1" style="font-size: 13px;">
          ${s.nombre}
        </h6>

        <!-- DESCRIPCIÓN -->
        <p class="small text-muted mb-1" style="font-size: 11px;">
          ${s.descripcion || ""}
        </p>

        <!-- ⭐ -->
        <div class="text-warning mb-1" style="font-size: 12px;">
          ⭐⭐⭐⭐☆
        </div>

        <!-- 💰 -->
        <div class="fw-bold text-success mb-2" style="font-size: 13px;">
          ${formatearPrecio(s.precio)}
        </div>

        <!-- BOTÓN -->
        <button class="btn btn-success btn-sm w-100 py-1" style="font-size: 12px;">
          Solicitar
        </button>

      </div>
    </div>
  `,
        )
        .join("");
    }

    function formatearPrecio(valor) {
      return new Intl.NumberFormat("es-CO", {
        style: "currency",
        currency: "COP",
      }).format(valor || 0);
    }

    return {
      buscarServicio,
    };
  })();
</script>
