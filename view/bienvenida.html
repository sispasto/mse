<style>
  .texto-version {
    font-size: 20px;
    font-family: "Poppins", sans-serif;
    margin-left: 25px;
  }

  .search-box {
    max-width: 600px;
    margin: auto;
  }

  .categoria {
    cursor: pointer;
    transition: 0.3s;
  }

  .categoria:hover {
    transform: scale(1.1);
  }

  .card-servicio {
    border-radius: 15px;
    transition: 0.3s;
  }

  .card-servicio:hover {
    transform: translateY(-5px);
  }
</style>

<div class="container text-center mt-5">
  <!-- LOGO -->
  <div class="mb-4">
    <img
      id="imgBienvenida"
      src="/mse/assets/bienvenida.png"
      style="max-width: 180px"
    />
    <p class="mt-2">¡Aquí estamos para ayudarte!</p>
  </div>

  <!-- BUSCADOR -->
  <div class="input-group shadow search-box">
    <span class="input-group-text bg-white">
      <i class="bi bi-search"></i>
    </span>
    <input
      type="text"
      id="buscador"
      class="form-control"
      placeholder="Buscar servicio... (ej: manicure, instalar Office, electricidad)"
    />
    <button
      class="btn btn-primary"
      onclick="nsConsultarServicios.buscarServicio()"
    >
      Buscar
    </button>
  </div>

  <!-- CATEGORÍAS -->
  <div class="row mt-4 justify-content-center">
    <div class="col-4 col-md-2 categoria" onclick="filtrar('tecnologia')">
      <i class="bi bi-pc-display fs-1 text-primary"></i>
      <p>Tecnología</p>
    </div>

    <div class="col-4 col-md-2 categoria" onclick="filtrar('belleza')">
      <i class="bi bi-brush fs-1 text-danger"></i>
      <p>Belleza</p>
    </div>

    <div class="col-4 col-md-2 categoria" onclick="filtrar('electricidad')">
      <i class="bi bi-lightning fs-1 text-warning"></i>
      <p>Electricidad</p>
    </div>

    <div class="col-4 col-md-2 categoria" onclick="filtrar('hogar')">
      <i class="bi bi-tools fs-1 text-secondary"></i>
      <p>Hogar</p>
    </div>

    <div class="col-4 col-md-2 categoria" onclick="filtrar('otros')">
      <i class="bi bi-box fs-1 text-success"></i>
      <p>Otros</p>
    </div>
  </div>
</div>

<!-- RESULTADOS -->
<div class="container mt-5">
  <h4 class="text-start mb-3">Resultados de búsqueda</h4>

  <div class="row g-4" id="resultados">
    <!-- EJEMPLO CARD -->
    <div class="col-md-3">
      <div class="card shadow-sm card-servicio h-100">
        <div class="card-body text-start">
          <img src="/mse/assets/logo1.png" style="height: 40px" />
          <h5 class="mt-2">Servicios Tech Pasto</h5>
          <p class="mb-1">Instalación de Office</p>
          <small>⭐ 4.8 · Pasto</small>
          <div class="mt-3 d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">Ver perfil</button>
            <button class="btn btn-success btn-sm">Contactar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  document.getElementById("buscador").addEventListener("keyup", () => {
    nsConsultarServicios.buscarServicio();
  });

  var nsConsultarServicios = (function () {
    // 🔍 BUSCAR SERVICIOS
    async function buscarServicio() {
      const texto = document.getElementById("buscador").value;

      try {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        // 🔐 VALIDAR SESIÓN
        if (!session) {
          alert("Debes iniciar sesión");
          return;
        }

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/mse_consultar_servicios`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({
              search: texto,
            }),
          },
        );

        const result = await response.json();

        if (result.status === "success") {
          pintarServicios(result.servicios);
        } else {
          console.error(result.message);
        }
      } catch (err) {
        console.error("Error:", err);
      }
    }

    // 🎨 PINTAR SERVICIOS (puedes reutilizar el tuyo)
    function pintarServicios(servicios) {
      const contenedor = document.getElementById("contenedorServicios");

      if (!servicios || servicios.length === 0) {
        contenedor.innerHTML =
          '<p class="text-center py-5 text-muted">No hay servicios disponibles.</p>';
        return;
      }

      contenedor.innerHTML = servicios
        .map(
          (s) => `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card h-100 card-servicio shadow-sm">
          <div class="card-body text-center d-flex flex-column align-items-center">

            <div class="mb-3" style="height:60px;">
              <img src="${s.logo || ""}" style="max-height:60px; object-fit:contain;">
            </div>

            <h6 class="fw-bold mb-1">${s.nombre}</h6>

            <p class="small text-muted mb-2">
              ${s.descripcion || ""}
            </p>

            <div class="badge bg-light text-success mb-2">
              ${formatearPrecio(s.precio)}
            </div>

          </div>
        </div>
      </div>
    `,
        )
        .join("");
    }

    function formatearPrecio(valor) {
      return new Intl.NumberFormat("es-CO", {
        style: "currency",
        currency: "COP",
      }).format(valor || 0);
    }

    // 📦 EXPORTAR FUNCIONES
    return {
      buscarServicio,
    };
  })();
</script>
