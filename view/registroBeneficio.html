<style>   
  .icono { width: 32px; height: 32px; max-width: 60%; }
  .texto-icono { font-size: 10px; font-family: 'Poppins', sans-serif; }
</style>

<div>
  <div class="container-fluid">
    <form id="formBeneficio" onsubmit="nsRegistroBeneficio.procesarFormulario(event,this)">
      <div class="container-fluid p-0 m-0">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-5">
            <div class="card shadow border-0">
              <div class="card-header bg-dark text-white d-flex align-items-center" style="height:3rem">
                <h5 class="card-title mb-0 fw-bold">Asignar Beneficio a Cliente</h5>
              </div>

              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label fw-bold">Celular del Cliente</label>
                  <input type="tel" id="celular_cliente" placeholder="Ej: 3001234567" 
                         pattern="^3[0-9]{9}$" maxlength="10" class="form-control" required>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Red de Redención</label>
                  <select id="id_red" class="form-select" disabled>
                    <option value="null">Cargando redes...</option>
                  </select>
                </div>
              </div>

              <div class="card-footer d-flex gap-2">
                <button type="submit" class="btn btn-dark flex-fill" id="btnGuardarBeneficio" disabled>
                  ASIGNAR BENEFICIO
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
var nsRegistroBeneficio = (function () {
  const SUPABASE_URL = "https://pmbxyfketmuzocepllvf.supabase.co";
  const SUPABASE_ANON_KEY = "TU_ANON_KEY";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function cargarRedes() {
    const selectRed = document.getElementById("id_red");
    const btn = document.getElementById("btnGuardarBeneficio");

    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return;

      // 1. Obtener el empresa_id del usuario logueado
      const { data: usuario } = await supabaseClient
        .from("mse_usuarios")
        .select("empresa_id")
        .eq("uuid", session.user.id)
        .single();

      if (!usuario?.empresa_id) throw new Error("No se vinculó empresa");

      // 2. Consultar las redes donde la empresa tiene beneficios configurados
      // Usamos la tabla mse_beneficios_red para saber en qué redes participa
      const { data: redes, error } = await supabaseClient
        .from("mse_redes")
        .select(`
          id,
          nombre
        `)
        .in('id', 
          (await supabaseClient
            .from('mse_beneficios_red')
            .select('red_id')
            .eq('empresa_id', usuario.empresa_id)
          ).data.map(r => r.red_id)
        );

      if (error) throw error;

      // 3. Llenar el Select
      let opciones = '<option value="null">--- Todas las Redes (Global) ---</option>';
      redes.forEach(red => {
        opciones += `<option value="${red.id}">${red.nombre}</option>`;
      });

      selectRed.innerHTML = opciones;
      selectRed.disabled = false;
      btn.disabled = false;

    } catch (err) {
      console.error("Error cargando redes:", err);
      selectRed.innerHTML = '<option value="null">Error al cargar redes</option>';
    }
  }

  async function procesarFormulario(event, form) {
    event.preventDefault();
    const btn = document.getElementById("btnGuardarBeneficio");
    btn.disabled = true;

    try {
      const celular = document.getElementById("celular_cliente").value.trim();
      let id_red = document.getElementById("id_red").value;
      id_red = (id_red === "null") ? null : id_red;

      const { data: { session } } = await supabaseClient.auth.getSession();
      
      const response = await fetch(`${SUPABASE_URL}/functions/v1/mse_registrar_beneficio`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ celular, id_red }) 
      });

      const result = await response.json();
      if (!response.ok) throw new Error(result.error);

      alertSMS(`✅ Beneficio registrado correctamente.`);
      form.reset();
      // Mantenemos las redes cargadas
    } catch (err) {
      alertSMS(err.message);
      btn.disabled = false;
    }
  }

  return { procesarFormulario, cargarRedes };
})();
</script>
