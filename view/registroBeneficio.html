<style>   
  .icono { width: 32px; height: 32px; max-width: 60%; }
  .texto-icono { font-size: 10px; font-family: 'Poppins', sans-serif; }
  @media screen and (min-width: 768px) {
    .icono { width: 48px; height: 48px; }
    .texto-icono { font-size: 14px; font-family: 'Poppins', sans-serif; }
  }
</style>

<div>
  <div class="container-fluid">
    <form id="formBeneficio" onsubmit="nsRegistroBeneficio.procesarFormulario(event,this)">
      <div class="container-fluid p-0 m-0">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-5">

            <div class="card shadow border-0">
              <div class="card-header bg-dark text-white d-flex align-items-center" style="height:3rem">
                <h5 class="card-title mb-0 fw-bold">Asignar Beneficio a Cliente</h5>
              </div>

              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label">ID de Persona (Cliente)</label>
                  <input type="number" class="form-control" id="persona_id" placeholder="Ingrese el ID de la persona" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Servicio</label>
                  <select id="id_servicio" class="form-select" required>
                    <option value="">Seleccione el servicio...</option>
                    <option value="f440b5c5-2d27-4d26-9320-e9885d01f3f8">Servicio Ejemplo</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Descuento (%) o Valor</label>
                  <input type="number" step="0.01" id="valor_descuento" class="form-control" placeholder="Ej: 15.00" required>
                </div>
              </div>

              <div class="card-footer d-flex gap-2">
                <button type="submit" class="btn btn-dark flex-fill" id="btnGuardarBeneficio">
                  REGISTRAR BENEFICIO
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
var nsRegistroBeneficio = (function () {

  const SUPABASE_URL = "https://pmbxyfketmuzocepllvf.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // Tu llave
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function procesarFormulario(event, form) {
    event.preventDefault();

    const btn = document.getElementById("btnGuardarBeneficio");
    btn.disabled = true;
    btn.classList.add("disabled");

    try {
      const persona_id = document.getElementById("persona_id").value;
      const id_servicio = document.getElementById("id_servicio").value;
      const descuento = document.getElementById("valor_descuento").value;

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) throw new Error("Sesión no válida. Inicie sesión nuevamente.");

      // Llamada a la Edge Function específica de beneficios
      const response = await fetch(
        `${SUPABASE_URL}/functions/v1/mse_registrar_beneficio`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${session.access_token}`
          },
          body: JSON.stringify({ 
            persona_id: parseInt(persona_id), 
            id_servicio: id_servicio, 
            descuento: parseFloat(descuento) 
          })
        }
      );

      const result = await response.json();

      if (!response.ok) {
        throw new Error(result.error || "Error al registrar el beneficio");
      }

      alertSMS("Beneficio asignado correctamente ✅");
      form.reset();

    } catch (err) {
      console.error(err);
      alertSMS(err.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove("disabled");
    }
  }

  return {
    procesarFormulario
  };

})();
</script>
