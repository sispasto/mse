<style>
  .empresa-item { cursor: pointer; transition: 0.3s; opacity: 0.6; min-width: 90px; }
  .empresa-item.active { opacity: 1; transform: scale(1.1); border-bottom: 3px solid #198754; }
  .logo-empresa { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; background: #eee; border: 1px solid #ddd; }
  .card-servicio { border: none; border-radius: 12px; transition: 0.3s; background: #fff; }
  .card-servicio:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); transform: translateY(-5px); }
</style>

<div class="container mt-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h6 class="text-muted mb-3 fw-bold">Mis Beneficios Disponibles</h6>
      <div id="listaEmpresasBeneficio" class="d-flex gap-4 overflow-auto pb-2">
        </div>
    </div>
  </div>

  <div id="contenedorServicios" class="row g-3">
    <div class="col-12 text-center py-5">
      <p class="text-muted">Selecciona una empresa para ver los servicios disponibles</p>
    </div>
  </div>
</div>

<script>
var nsRedencion = (function() {
  // Configuración necesaria dentro del scope
  const SUPABASE_URL = "https://pmbxyfketmuzocepllvf.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtYnh5ZmtldG11em9jZXBsbHZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3ODE4NjUsImV4cCI6MjA3MzM1Nzg2NX0.oh9zssayvCPp-jcCohQugTx28Ds2Ts-y7Tbp-pgX1XE";
  
  // Asegurarnos de usar el cliente global o crearlo si no existe
  const supabaseClient = window.supabase ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

  let misBeneficios = [];

  async function inicializar() {
    try {
      if (!supabaseClient) {
        console.error("Supabase no está definido.");
        return;
      }

      const { data: { session }, error: sessionErr } = await supabaseClient.auth.getSession();
      if (sessionErr || !session) {
          mostrarError("Debes iniciar sesión para ver tus beneficios.");
          return;
      }

      // Llamada a la Edge Function
      const res = await fetch(`${SUPABASE_URL}/functions/v1/mse_consultar_beneficios_persona`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        }
      });

      const result = await res.json();
      if (!res.ok) throw new Error(result.error || "Error al consultar");

      misBeneficios = result.data || [];
      renderEmpresas();

    } catch (err) {
      console.error("Error en inicializar:", err);
      mostrarError(err.message);
    }
  }

  function renderEmpresas() {
    const contenedor = document.getElementById('listaEmpresasBeneficio');
    if (!contenedor) return;
    
    if (misBeneficios.length === 0) {
        contenedor.innerHTML = '<p class="text-muted small">No tienes beneficios activos sin redimir.</p>';
        return;
    }

    contenedor.innerHTML = misBeneficios.map(b => `
      <div class="empresa-item text-center p-2" onclick="nsRedencion.seleccionarEmpresa('${b.empresa_origen_id}', this)">
        <img src="${b.mse_empresas?.logo_url || 'https://via.placeholder.com/60'}" class="logo-empresa shadow-sm">
        <div class="small mt-1 fw-bold text-truncate" style="max-width: 80px;">${b.mse_empresas?.nombre_comercial || 'Empresa'}</div>
      </div>
    `).join('');
  }

  async function seleccionarEmpresa(empresaId, elemento) {
    document.querySelectorAll('.empresa-item').forEach(el => el.classList.remove('active'));
    elemento.classList.add('active');

    const beneficio = misBeneficios.find(b => b.empresa_origen_id === empresaId);
    if (!beneficio) return;

    const contenedor = document.getElementById('contenedorServicios');
    contenedor.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-success"></div></div>';
    
    // CONSULTA OPTIMIZADA
    let query = supabaseClient
      .from('mse_servicios')
      .select('*')
      .eq('activo', true);

    // Si tu lógica dice que id_red manda:
    if (beneficio.id_red) {
        // Asegúrate de que id_red en la DB sea UUID si pasas un UUID
        query = query.eq('id_red', beneficio.id_red);
    } else {
        // Si empresa_id es BIGINT, y empresaId es UUID, esto fallará.
        // Verifica si 'empresa_id' realmente debería recibir ese UUID.
        query = query.eq('empresa_id', empresaId); 
    }

    const { data: servicios, error } = await query;

    if (error) {
        console.error("Error filtrando servicios:", error);
        mostrarError("Error al cargar servicios: " + error.message);
        return;
    }

    renderServicios(servicios, beneficio.id);
}

  function renderServicios(servicios, beneficioId) {
    const contenedor = document.getElementById('contenedorServicios');
    if (!servicios || servicios.length === 0) {
        contenedor.innerHTML = '<p class="text-center py-5 text-muted">No hay servicios disponibles para esta selección.</p>';
        return;
    }

    contenedor.innerHTML = servicios.map(s => `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card h-100 card-servicio shadow-sm">
          <div class="card-body text-center d-flex flex-column">
            <h6 class="fw-bold mb-1">${s.nombre}</h6>
            <p class="small text-muted mb-2 flex-grow-1">${s.descripcion || ''}</p>
            <button class="btn btn-sm btn-success w-100 mt-2" onclick="nsRedencion.ejecutarRedencion('${beneficioId}', '${s.id}')">
              Redimir
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  async function ejecutarRedencion(beneficioId, servicioId) {
      if (!confirm("¿Deseas redimir este beneficio ahora?")) return;

      try {
          const { data: { session } } = await supabaseClient.auth.getSession();
          const res = await fetch(`${SUPABASE_URL}/functions/v1/mse_redimir_beneficio`, {
              method: "POST",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${session.access_token}`
              },
              body: JSON.stringify({ beneficio_id: beneficioId, servicio_id: servicioId })
          });

          const result = await res.json();
          if (!res.ok) throw new Error(result.error);

          alert("¡Redención exitosa!");
          inicializar(); // Recargar lista
      } catch (err) {
          alert("Error: " + err.message);
      }
  }

  function mostrarError(msg) {
    const cont = document.getElementById('contenedorServicios');
    if (cont) cont.innerHTML = `<div class="alert alert-danger mx-3">${msg}</div>`;
  }

  return { inicializar, seleccionarEmpresa, ejecutarRedencion };
})();

// Lógica de arranque robusta
if (document.readyState === "complete" || document.readyState === "interactive") {
    nsRedencion.inicializar();
} else {
    document.addEventListener("DOMContentLoaded", nsRedencion.inicializar);
}
</script>
