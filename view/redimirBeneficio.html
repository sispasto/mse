<style>
  .empresa-item { cursor: pointer; transition: 0.3s; opacity: 0.6; min-width: 90px; }
  .empresa-item.active { opacity: 1; transform: scale(1.1); border-bottom: 3px solid #198754; }
  .logo-empresa { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; background: #eee; border: 1px solid #ddd; }
  .card-servicio { border: none; border-radius: 12px; transition: 0.3s; background: #fff; }
  .card-servicio:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); transform: translateY(-5px); }
</style>

<div class="container mt-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h6 class="text-muted mb-3 fw-bold">Mis Beneficios Disponibles</h6>
      <div id="listaEmpresasBeneficio" class="d-flex gap-4 overflow-auto pb-2">
        </div>
    </div>
  </div>

  <div id="contenedorServicios" class="row g-3">
    <div class="col-12 text-center py-5">
      <p class="text-muted">Selecciona una empresa para ver los servicios disponibles</p>
    </div>
  </div>
</div>

  async function inicializar() {
    try {
      // 1. Pequeña espera para asegurar que el navegador haya poblado el storage

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return mostrarError("Sesión de Supabase no encontrada.");

      // En tu captura se ve 'personald'

      }

      const personaId = parseInt(personaIdRaw, 10);

        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ persona_id: personaId })

      if (!res.ok) throw new Error(result.error || "Error al consultar la Edge Function");

      renderEmpresas();

      console.error("Error en inicializar:", err);

  async function seleccionarEmpresa(empresaId, elemento) {
    document.querySelectorAll('.empresa-item').forEach(el => el.classList.remove('active'));
    elemento.classList.add('active');

    const beneficio = misBeneficios.find(b => b.empresa_origen_id === empresaId);
    if (!beneficio) return;

    const contenedor = document.getElementById('contenedorServicios');
    contenedor.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-success"></div></div>';
    
    // Los servicios se consultan directamente ya que es un catálogo de referencia
    let { data: servicios, error } = await supabaseClient
      .from('mse_servicios')
      .select('*')
      .eq('activo', true);

    if (error) return mostrarError("Error al cargar servicios: " + error.message);

    // Filtrado por Red o por Empresa específica
    const filtrados = beneficio.id_red 
      ? servicios.filter(s => s.id_red === beneficio.id_red)
      : servicios.filter(s => s.empresa_id === empresaId);

    renderServicios(filtrados, beneficio.id);
  }

  function renderServicios(servicios, beneficioId) {
    const contenedor = document.getElementById('contenedorServicios');
    if (!servicios.length) {
      contenedor.innerHTML = '<p class="text-center py-5 text-muted">No hay servicios disponibles para esta empresa.</p>';
      return;
    }

    contenedor.innerHTML = servicios.map(s => `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card h-100 card-servicio shadow-sm">
          <div class="card-body text-center d-flex flex-column">
            <h6 class="fw-bold mb-1">${s.nombre}</h6>
            <p class="small text-muted mb-2 flex-grow-1">${s.descripcion || ''}</p>
            <button class="btn btn-sm btn-success w-100 mt-2" onclick="nsRedencion.ejecutarRedencion('${beneficioId}', '${s.id}')">
              Redimir
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  async function ejecutarRedencion(beneficioId, servicioId) {
    if (!confirm("¿Deseas redimir este beneficio ahora?")) return;

    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/mse_redimir_beneficio`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ beneficio_id: beneficioId, servicio_id: servicioId })
      });

      const result = await res.json();
      if (!res.ok) throw new Error(result.error || "Error en el proceso de redención");

      alert("¡Redención exitosa!");
      inicializar(); // Refrescar vista
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  function mostrarError(msg) {
    const cont = document.getElementById('contenedorServicios');
    if (cont) cont.innerHTML = `<div class="alert alert-danger mx-3">${msg}</div>`;
  }

  return { inicializar, seleccionarEmpresa, ejecutarRedencion };
})();

// Lógica de arranque robusta
if (document.readyState === "complete" || document.readyState === "interactive") {
    nsRedencion.inicializar();
} else {
    document.addEventListener("DOMContentLoaded", nsRedencion.inicializar);//
}
